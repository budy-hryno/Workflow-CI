name: Machine Learning System CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CSV_URL: "MLproject/loan_default_preprocessing.csv"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE
      - uses: actions/checkout@v3

      # Setup Python 3.12.7
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      # Check Env Variables
      - name: Check Env
        run: |
          echo $CSV_URL

      # Install mlflow
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn joblib

      # Run as a mlflow project
      - name: Run mlflow project
        run: |
          cd Workflow-CI/MLproject
          mlflow run . --env-manager=local

      - name: Save up Git LFS
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git lfs install
          git lfs track "Workflow-CI/MLproject/mlruns/**"
          git add .gitattributes
          git commit -m "Track large files in mlruns with Git LFS" || true
          git push origin master

      # Save models to GitHub Repository
      - name: Save mlruns to repo
        run: |
          git config --global user.name ${{ secrets.username }}
          git config --global user.email ${{ secrets.email }}
          git add -f Workflow-CI/MLproject/mlruns/
          git commit -m "Save mlruns from CI run" || true
          git push origin master
